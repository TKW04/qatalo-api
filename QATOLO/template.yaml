DeliveryReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: delivery_reminder.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          TRANSACTIONS_TABLE: !Ref TransactionsTable   # ajusta al nombre real
          BUSINESSES_TABLE:   !Ref BusinessesTable     # ajusta al nombre real
          MAIL_API_TOKEN:     !Ref MailApiToken
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TransactionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref BusinessesTable
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 12 * * ? *)   # 12:00 UTC = 8:00 AM hora RD
            Name: QataloDailyDeliveryReminder
            Description: Recordatorio diario de entregas a dueños de negocios
            Enabled: true