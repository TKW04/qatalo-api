<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8" /></head>
<body style="margin:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:480px;margin:40px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(17,63,103,.12);">
    <div style="background:linear-gradient(135deg,#113F67,#34699A);padding:28px 24px;text-align:center;">
      <h1 style="color:#fff;margin:0;font-size:20px;">{{ business_name }}</h1>
    </div>
    <div style="padding:32px 28px;">
      <p style="color:#1d2939;font-size:16px;margin:0 0 8px;">Hola {{ name }},</p>
      <p style="color:#475467;font-size:15px;line-height:1.6;margin:0 0 24px;">
        Usa este código para ver tus órdenes. Vence en 10 minutos.
      </p>
      <div style="font-size:36px;font-weight:800;letter-spacing:10px;color:#113F67;
                  background:#f0f7ff;border-radius:12px;text-align:center;padding:18px 0;">
        {{ code }}
      </div>
      <p style="color:#98a2b3;font-size:13px;margin:24px 0 0;text-align:center;">
        Si no solicitaste este código, ignora este correo.
      </p>
    </div>
  </div>
</body>
</html>
